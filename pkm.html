<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>이 포켓몬은 누구?!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #1c2b4a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 12px 30px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(1.5px 1.5px at 15% 25%, #fff, transparent),
                radial-gradient(1px 1px at 35% 65%, rgba(255, 255, 255, .7), transparent),
                radial-gradient(1.5px 1.5px at 55% 15%, #fff, transparent),
                radial-gradient(1px 1px at 75% 55%, rgba(255, 255, 255, .6), transparent),
                radial-gradient(1px 1px at 85% 85%, rgba(255, 255, 255, .8), transparent),
                radial-gradient(1.5px 1.5px at 8% 75%, rgba(255, 255, 255, .5), transparent),
                radial-gradient(1px 1px at 92% 40%, rgba(255, 255, 255, .7), transparent),
                radial-gradient(1px 1px at 45% 90%, rgba(255, 255, 255, .4), transparent),
                radial-gradient(1.5px 1.5px at 65% 80%, rgba(255, 255, 255, .6), transparent);
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .hdr {
            text-align: center
        }

        .hdr h1 {
            font-size: 1.85em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 16px rgba(255, 215, 0, .4), 2px 2px 0 #7a5f00;
            letter-spacing: -0.5px
        }

        .hdr p {
            color: rgba(255, 255, 255, .5);
            font-size: .82em;
            margin-top: 3px
        }

        .gens {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 2px;
        }

        .gens::-webkit-scrollbar { display: none }

        /* 공간이 남으면 가운데 정렬, 넘치면 자연스럽게 스크롤 */
        .gbtn:first-child { margin-left: auto }
        .gbtn:last-child { margin-right: auto }

        .gbtn {
            padding: 8px 15px;
            border: 2px solid rgba(255, 215, 0, .4);
            background: transparent;
            color: rgba(255, 215, 0, .6);
            border-radius: 20px;
            cursor: pointer;
            font-size: .8em;
            font-weight: 700;
            transition: .2s;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .gbtn:hover {
            border-color: #FFD700;
            color: #FFD700
        }

        .gbtn.on {
            background: #FFD700;
            border-color: #FFD700;
            color: #1c2b4a
        }

        .scores {
            display: flex;
            gap: 0;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 14px;
            overflow: hidden;
        }

        .sc {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-right: 1px solid rgba(255, 255, 255, .1)
        }

        .sc:last-child {
            border-right: none
        }

        .sv {
            font-size: 1.5em;
            font-weight: 900;
            color: #FFD700;
            line-height: 1
        }

        .sl {
            font-size: .68em;
            color: rgba(255, 255, 255, .45);
            margin-top: 2px
        }

        .fire {
            color: #ff6b35
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 22px;
            padding: 20px 18px;
            text-align: center;
        }

        .pnum {
            color: rgba(255, 255, 255, .35);
            font-size: .82em;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px
        }

        .imgbox {
            width: 210px;
            height: 210px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #243a6e, #142040);
            box-shadow: 0 0 30px rgba(255, 215, 0, .12), inset 0 0 20px rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .imgbox::after {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, .07);
            pointer-events: none;
        }

        .pimg {
            width: 180px;
            height: 180px;
            object-fit: contain;
            transition: filter .5s ease;
            image-rendering: auto;
        }

        .pimg.sil {
            filter: brightness(0) drop-shadow(0 0 4px rgba(0, 0, 0, .3))
        }

        .pimg.show {
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .4))
        }

        .ld {
            position: absolute;
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, .1);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .img-err {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, .4);
            font-size: .8em;
        }

        .img-err .em {
            font-size: 2.5em
        }

        .pname {
            font-size: 1.55em;
            font-weight: 900;
            min-height: 40px;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }

        .pname.ans {
            color: #FFD700
        }

        .hint {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            color: rgba(255, 255, 255, .7);
            font-size: .85em;
            line-height: 1.6;
            text-align: left;
            min-height: 44px;
        }

        .hint-label {
            color: #FFD700;
            font-weight: 700;
            font-size: .75em;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

/* 4지선다 버튼 */
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .cbtn {
            padding: 13px 10px;
            border: 2px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .07);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: .95em;
            font-weight: 700;
            font-family: inherit;
            transition: .2s;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: keep-all;
        }

        .cbtn:hover:not(.picked) {
            border-color: #FFD700;
            background: rgba(255, 215, 0, .1);
            color: #FFD700;
            transform: scale(1.02);
        }

        .cbtn:active:not(.picked) {
            transform: scale(.97)
        }

        .cbtn.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, .2);
            color: #4ade80;
        }

        .cbtn.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, .15);
            color: #f87171;
        }

        .cbtn.dim {
            opacity: .35;
            pointer-events: none;
        }

        .cbtn.picked {
            pointer-events: none;
        }

        .fb {
            min-height: 26px;
            font-weight: 700;
            font-size: .95em;
            margin-bottom: 10px
        }

        .fb.ok {
            color: #4ade80
        }

        .fb.no {
            color: #f87171
        }

        .brow {
            display: flex;
            gap: 8px;
            justify-content: center
        }

        .nxt {
            display: none;
            padding: 10px 28px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 10px;
            color: #0f2e0f;
            font-weight: 900;
            font-size: .95em;
            cursor: pointer;
            font-family: inherit;
            transition: .2s;
        }

        .nxt:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 12px rgba(74, 222, 128, .35)
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) }
            20% { transform: translateX(-7px) }
            40% { transform: translateX(7px) }
            60% { transform: translateX(-5px) }
            80% { transform: translateX(5px) }
        }

        @keyframes pop {
            0% { transform: scale(1) }
            40% { transform: scale(1.22) }
            70% { transform: scale(.97) }
            100% { transform: scale(1) }
        }

        @keyframes fadeup {
            from { opacity: 0; transform: translateY(8px) }
            to { opacity: 1; transform: translateY(0) }
        }

        .shake { animation: shake .35s ease }
        .pop { animation: pop .45s ease }
        .fadeup { animation: fadeup .35s ease }

        .cf {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 2px
        }

        @keyframes cfall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1 }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0 }
        }

        .bgm-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 100;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, .4);
            background: rgba(28, 43, 74, .85);
            color: #FFD700;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
            backdrop-filter: blur(4px);
        }

        .bgm-toggle:hover {
            border-color: #FFD700;
            transform: scale(1.1);
        }

        .bgm-toggle.off {
            color: rgba(255, 215, 0, .35);
            border-color: rgba(255, 215, 0, .2);
        }

        /* 모드 선택 */
        .modes {
            display: flex;
            gap: 6px;
            justify-content: center
        }

        .mbtn {
            padding: 6px 14px;
            border: 2px solid rgba(78, 205, 196, .4);
            background: transparent;
            color: rgba(78, 205, 196, .7);
            border-radius: 20px;
            cursor: pointer;
            font-size: .82em;
            font-weight: 700;
            transition: .2s;
            font-family: inherit;
        }

        .mbtn:hover { border-color: #4ECDC4; color: #4ECDC4 }

        .mbtn.on {
            background: #4ECDC4;
            border-color: #4ECDC4;
            color: #1c2b4a
        }

        /* 타임어택 타이머 */
        .sv.low {
            color: #f87171;
            animation: blink 1s steps(2) infinite
        }

        @keyframes blink { 50% { opacity: .4 } }

        /* 타임어택 종료 패널 */
        .ta-end { display: none; padding: 6px 0 2px }

        .ta-title {
            font-size: 1.25em;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 6px
        }

        .ta-score {
            font-size: 1.05em;
            color: #fff;
            font-weight: 700;
            margin-bottom: 12px
        }

        .name-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px
        }

        .name-row input {
            width: 150px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid rgba(255, 215, 0, .5);
            background: rgba(255, 255, 255, .08);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            text-align: center;
            font-size: .95em;
        }

        .name-row input:focus { outline: none; border-color: #FFD700 }

        .abtn {
            padding: 10px 18px;
            background: linear-gradient(135deg, #FFD700, #f0b400);
            border: none;
            border-radius: 10px;
            color: #4a3800;
            font-weight: 900;
            font-size: .9em;
            cursor: pointer;
            font-family: inherit;
            transition: .2s;
        }

        .abtn:hover { transform: scale(1.05) }

        /* 리더보드 */
        .board {
            display: none;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 22px;
            padding: 16px 18px;
        }

        .board-title {
            font-weight: 900;
            color: #FFD700;
            text-align: center;
            margin-bottom: 10px
        }

        .brd-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            font-size: .9em;
            color: rgba(255, 255, 255, .85);
        }

        .brd-row:last-child { border-bottom: none }
        .brd-row.top { font-weight: 700 }

        .brd-rank { width: 30px; text-align: center; flex-shrink: 0 }

        .brd-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .brd-gen {
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(78, 205, 196, .15);
            border: 1px solid rgba(78, 205, 196, .35);
            color: #4ECDC4;
            font-size: .78em;
            font-weight: 700;
            flex-shrink: 0;
        }

        .brd-score { color: #FFD700; font-weight: 900 }
        .brd-date { color: rgba(255, 255, 255, .35); font-size: .85em }

        .board-empty {
            text-align: center;
            color: rgba(255, 255, 255, .4);
            padding: 10px 0;
            font-size: .88em
        }

        /* 연습 모드 결과 팝업 (화면 하단 고정 — 스크롤 위치와 무관하게 항상 보임) */
        .fb-pop {
            display: none;
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: 14px;
            margin: 0 auto;
            max-width: 456px;
            z-index: 9000;
            text-align: center;
            background: rgba(16, 26, 52, .97);
            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 16px;
            padding: 16px 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .6);
            animation: fadeup .3s ease;
        }

        .fb-pop.ok { border-color: rgba(74, 222, 128, .6) }
        .fb-pop.no { border-color: rgba(248, 113, 113, .6) }

        .fb-msg {
            font-weight: 700;
            font-size: .95em;
            margin-bottom: 12px;
        }

        .fb-pop.ok .fb-msg { color: #4ade80 }
        .fb-pop.no .fb-msg { color: #f87171 }

        .nxt2 {
            padding: 10px 28px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 10px;
            color: #0f2e0f;
            font-weight: 900;
            font-size: .95em;
            cursor: pointer;
            font-family: inherit;
            transition: .2s;
        }

        .nxt2:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 12px rgba(74, 222, 128, .35)
        }

        /* 타임어택 카운트다운 */
        .cdown {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 10;
            border-radius: 22px;
            background: rgba(20, 32, 64, .85);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
        }

        .cd-num {
            font-size: 5em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, .6), 3px 3px 0 #7a5f00;
        }

        .cd-num.pop2 { animation: cdpop .8s ease }

        @keyframes cdpop {
            0% { transform: scale(2.2); opacity: 0 }
            30% { transform: scale(1); opacity: 1 }
            80% { opacity: 1 }
            100% { opacity: .6; transform: scale(.92) }
        }

        /* 콤보 연출 */
        .combo-float {
            position: absolute;
            left: 50%;
            top: 34%;
            transform: translate(-50%, -50%);
            font-size: 1.7em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 12px rgba(255, 215, 0, .8), 2px 2px 0 #7a5f00;
            pointer-events: none;
            white-space: nowrap;
            z-index: 5;
            animation: comboUp 1.15s ease forwards;
        }

        .combo-float.mega {
            font-size: 2.1em;
            color: #ff6b35;
            text-shadow: 0 0 16px rgba(255, 107, 53, .9), 2px 2px 0 #5c1f00
        }

        @keyframes comboUp {
            0% { opacity: 0; transform: translate(-50%, -20%) scale(.4) }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) }
            55% { opacity: 1; transform: translate(-50%, -58%) scale(1) }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.05) }
        }

        #flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
            background: radial-gradient(circle, rgba(255, 215, 0, .3), transparent 70%);
        }

        #flash.go { animation: flashfade .55s ease }

        @keyframes flashfade {
            0% { opacity: 0 }
            30% { opacity: 1 }
            100% { opacity: 0 }
        }

        @media(max-width:380px) {
            .hdr h1 { font-size: 1.5em }
            .imgbox { width: 180px; height: 180px }
            .pimg { width: 155px; height: 155px }
            .cbtn { font-size: .85em; padding: 10px 8px }
            .sv { font-size: 1.25em }
        }
    </style>
</head>

<body>
    <button class="bgm-toggle off" id="bgmBtn" title="배경음악">🔇</button>

    <div class="wrap">

        <div class="hdr">
            <h1>🔴 이 포켓몬은 누구?! 🔴</h1>
            <p>실루엣을 보고 이름을 맞춰보세요!</p>
        </div>

        <div class="gens" id="gens">
            <button class="gbtn on" data-g="0">전체</button>
            <button class="gbtn" data-g="1">1세대</button>
            <button class="gbtn" data-g="2">2세대</button>
            <button class="gbtn" data-g="3">3세대</button>
            <button class="gbtn" data-g="4">4세대</button>
            <button class="gbtn" data-g="5">5세대</button>
            <button class="gbtn" data-g="6">6세대</button>
            <button class="gbtn" data-g="7">7세대</button>
            <button class="gbtn" data-g="8">8세대</button>
        </div>

        <div class="modes">
            <button class="mbtn on" id="mNormal">🎮 연습</button>
            <button class="mbtn" id="mTa">⏱️ 타임어택</button>
            <button class="mbtn" id="mBoard">🏆 랭킹</button>
        </div>

        <div class="scores">
            <div class="sc">
                <div class="sv" id="sc">0</div>
                <div class="sl">✅ 정답</div>
            </div>
            <div class="sc">
                <div class="sv" id="st">0</div>
                <div class="sl">🎯 시도</div>
            </div>
            <div class="sc">
                <div class="sv fire" id="ss">0</div>
                <div class="sl">🔥 연속</div>
            </div>
            <div class="sc">
                <div class="sv" id="s4">0</div>
                <div class="sl" id="s4l">🏆 최고연속</div>
            </div>
        </div>

        <div class="card">
            <div class="pnum" id="pnum">No.000</div>

            <div class="imgbox" id="imgbox">
                <div class="ld" id="ld"></div>
                <img id="pimg" class="pimg sil" style="display:none" alt="포켓몬" />
                <div class="img-err" id="ierr">
                    <div class="em">❓</div>
                    <div>이미지 없음</div>
                </div>
            </div>

            <div class="pname" id="pname">？ ？ ？ ？</div>

            <div class="hint" id="hint">
                <div class="hint-label">📖 도감 설명</div>
                <div id="hintText"></div>
            </div>

            <div class="choices" id="choices">
                <button class="cbtn"></button>
                <button class="cbtn"></button>
                <button class="cbtn"></button>
                <button class="cbtn"></button>
            </div>

            <div class="fb" id="fb"></div>

            <div class="brow">
                <button class="nxt" id="nxt">다음 ▶</button>
            </div>

            <div class="ta-end" id="taEnd">
                <div class="ta-title" id="taTitle">⏱️ 타임어택 종료!</div>
                <div class="ta-score" id="taScore"></div>
                <div class="name-row" id="nameRow" style="display:none">
                    <input id="nameInput" maxlength="8" placeholder="이름 입력" />
                    <button class="abtn" id="saveBtn">기록 저장</button>
                </div>
                <div class="brow">
                    <button class="abtn" id="retryBtn">🔄 다시 도전</button>
                </div>
            </div>

            <div class="cdown" id="cdown">
                <div class="cd-num" id="cdNum">3</div>
            </div>

            <div class="fb-pop" id="fbPop">
                <div class="fb-msg" id="fbMsg"></div>
                <button class="nxt2" id="nxt2">다음 ▶</button>
            </div>
        </div>

        <div class="board" id="board">
            <div class="board-title">🏆 타임어택 TOP 10</div>
            <div id="boardList"></div>
        </div>

    </div>

    <div id="flash"></div>

    <script src="pkm_data.js"></script>
    <script src="pkm_hints.js"></script>
    <script>
        // 이름에서 폼 접미사 제거 (보기 표시용)
        function displayName(n) {
            return n.replace(/_.*$/, '');
        }

        // 고유 이름 목록 (보기 생성용) — 전체 + 세대별
        const uniqueNames = [...new Set(PD.map(p => displayName(p.n)))];
        const namesByGen = {};
        PD.forEach(p => {
            (namesByGen[p.g] ??= new Set()).add(displayName(p.n));
        });
        for (const g in namesByGen) namesByGen[g] = [...namesByGen[g]];

        let pool = [...PD], cur = null, ans = false, curGen = 0;
        let correct = 0, total = 0, streak = 0;

        // ===== 기록 저장 (이 브라우저의 localStorage — 기기별 저장) =====
        function lsGet(k, d) { try { return localStorage.getItem(k) ?? d } catch (e) { return d } }
        function lsSet(k, v) { try { localStorage.setItem(k, v) } catch (e) { } }
        let bestStreak = +lsGet('pkmq_best_streak', 0) || 0;
        function loadBoard() { try { return JSON.parse(lsGet('pkmq_board', '[]')) || [] } catch (e) { return [] } }

        // ===== 타임어택 상태 =====
        const TA_SECONDS = 100;
        let taMode = false, taOver = false, taTime = 0, taTimer = null, taAdvance = null;

        // 레트로 사운드 (Web Audio API) - 크로스 브라우저 + iOS
        var actx = null;
        var bgmGain = null;

        // iOS: 매 제스처마다 context를 생성/resume하고 바로 소리 재생
        // 별도 unlock 단계 없이 playTone 자체에서 처리
        function getCtx() {
            if (!actx) {
                var AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return null;
                actx = new AC();
                bgmGain = actx.createGain();
                bgmGain.gain.value = 1;
                bgmGain.connect(actx.destination);
            }
            // iOS: 매번 resume 시도 (제스처 안에서 호출되므로 유효)
            if (actx.state === 'suspended') actx.resume();
            return actx;
        }

        function playTone(freq, dur, type, vol) {
            var ctx = getCtx();
            if (!ctx) return;
            type = type || 'square';
            vol = vol || 0.12;
            try {
                var t = ctx.currentTime;
                var o = ctx.createOscillator();
                var g = ctx.createGain();
                o.type = type;
                o.frequency.setValueAtTime(freq, t);
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                o.connect(g);
                g.connect(ctx.destination);
                o.start(t);
                o.stop(t + dur);
            } catch(e) {}
        }
        function sfxCorrect() {
            playTone(523, 0.1); // C5
            setTimeout(() => playTone(659, 0.1), 80);  // E5
            setTimeout(() => playTone(784, 0.15), 160); // G5
            setTimeout(() => playTone(1047, 0.25), 240); // C6
        }
        function sfxWrong() {
            playTone(200, 0.15, 'sawtooth', 0.1);
            setTimeout(() => playTone(160, 0.25, 'sawtooth', 0.1), 120);
        }
        function sfxClick() {
            playTone(880, 0.06, 'square', 0.08);
        }
        function sfxNext() {
            playTone(440, 0.07, 'triangle', 0.1);
            setTimeout(() => playTone(660, 0.07, 'triangle', 0.1), 60);
        }

        // 배경음악 - 포켓몬풍 8비트 칩튠 루프
        let bgmPlaying = false;
        let bgmInterval = null;

        // 멜로디 시퀀스 (주파수, 박자배수) - 야생 배틀풍
        const melody = [
            // 파트 A - 긴박한 도입
            [659, 1], [659, 1], [0, 1], [659, 1], [0, 1], [523, 1], [659, 1], [784, 1],
            [740, 1], [659, 1], [0, 1], [740, 1], [784, 1], [0, 1], [659, 1], [0, 1],
            [880, 1], [831, 1], [784, 1], [0, 1], [659, 1], [784, 1], [880, 1], [0, 1],
            [784, 1], [659, 1], [523, 1], [587, 1], [494, 1], [0, 1], [0, 1], [0, 1],
            // 파트 B - 더 긴박하게
            [784, 1], [740, 1], [659, 1], [587, 1], [659, 1], [0, 1], [440, 1], [494, 1],
            [523, 1], [0, 1], [440, 1], [523, 1], [587, 1], [0, 1], [523, 1], [0, 1],
            [659, 1], [784, 1], [880, 1], [784, 1], [659, 1], [784, 1], [0, 1], [659, 1],
            [587, 1], [523, 1], [494, 1], [523, 1], [587, 1], [0, 1], [0, 1], [0, 1],
        ];
        const bass = [
            // 파트 A 베이스 - 빠른 옥타브 펌핑
            [165, 1], [330, 1], [165, 1], [330, 1], [175, 1], [349, 1], [175, 1], [349, 1],
            [185, 1], [370, 1], [185, 1], [370, 1], [196, 1], [392, 1], [196, 1], [392, 1],
            [220, 1], [440, 1], [220, 1], [440, 1], [196, 1], [392, 1], [196, 1], [392, 1],
            [175, 1], [349, 1], [165, 1], [330, 1], [147, 1], [294, 1], [147, 1], [294, 1],
            // 파트 B 베이스
            [196, 1], [392, 1], [196, 1], [392, 1], [220, 1], [440, 1], [220, 1], [440, 1],
            [262, 1], [523, 1], [262, 1], [523, 1], [247, 1], [494, 1], [247, 1], [494, 1],
            [220, 1], [440, 1], [220, 1], [440, 1], [196, 1], [392, 1], [196, 1], [392, 1],
            [175, 1], [349, 1], [165, 1], [330, 1], [147, 1], [294, 1], [147, 1], [294, 1],
        ];

        function bgmSchedule() {
            if (!actx || !bgmGain) return 0;
            try {
                var BPM = 220;
                var beatSec = 60 / BPM;
                var mTime = actx.currentTime + 0.05;
                var bTime = actx.currentTime + 0.05;
                var totalMelody = 0;

                melody.forEach(function(note) { totalMelody += note[1] * beatSec; });

                melody.forEach(function(note) {
                    var freq = note[0], dur = note[1];
                    if (freq > 0) {
                        var o = actx.createOscillator();
                        var g = actx.createGain();
                        o.type = 'square';
                        o.frequency.setValueAtTime(freq, mTime);
                        g.gain.setValueAtTime(0.06, mTime);
                        g.gain.exponentialRampToValueAtTime(0.001, mTime + dur * beatSec * 0.9);
                        o.connect(g); g.connect(bgmGain);
                        o.start(mTime);
                        o.stop(mTime + dur * beatSec);
                    }
                    mTime += dur * beatSec;
                });

                bass.forEach(function(note) {
                    var freq = note[0], dur = note[1];
                    if (freq > 0) {
                        var o = actx.createOscillator();
                        var g = actx.createGain();
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(freq, bTime);
                        g.gain.setValueAtTime(0.05, bTime);
                        g.gain.exponentialRampToValueAtTime(0.001, bTime + dur * beatSec * 0.85);
                        o.connect(g); g.connect(bgmGain);
                        o.start(bTime);
                        o.stop(bTime + dur * beatSec);
                    }
                    bTime += dur * beatSec;
                });

                return totalMelody;
            } catch(e) { return 0; }
        }

        function bgmStart() {
            if (bgmPlaying) return;
            var ctx = getCtx();
            if (!ctx || !bgmGain) return;
            bgmPlaying = true;
            bgmGain.gain.cancelScheduledValues(actx.currentTime);
            bgmGain.gain.setValueAtTime(1, actx.currentTime);
            var loopLen = bgmSchedule();
            if (loopLen <= 0) return;
            bgmInterval = setInterval(function() {
                if (bgmPlaying) bgmSchedule();
            }, loopLen * 1000);
        }

        function bgmStop() {
            bgmPlaying = false;
            if (actx && bgmGain) {
                bgmGain.gain.cancelScheduledValues(actx.currentTime);
                bgmGain.gain.setValueAtTime(0, actx.currentTime);
            }
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
        }

        // 음소거 토글
        document.getElementById('bgmBtn').addEventListener('click', function () {
            getCtx(); // iOS: 제스처 안에서 context 활성화
            if (bgmPlaying) {
                bgmStop();
                this.textContent = '🔇';
                this.classList.add('off');
            } else {
                bgmStart();
                this.textContent = '🔊';
                this.classList.remove('off');
            }
        });

        const $ = id => document.getElementById(id);
        const pnum = $('pnum'), pimgEl = $('pimg'),
            ldEl = $('ld'), ierrEl = $('ierr'), pnameEl = $('pname'),
            choicesEl = $('choices'),
            fbEl = $('fb'), nxtEl = $('nxt'),
            hintText = $('hintText');
        const cbtns = choicesEl.querySelectorAll('.cbtn');

        // 세대 필터
        document.getElementById('gens').addEventListener('click', e => {
            const btn = e.target.closest('.gbtn');
            if (!btn) return;
            document.querySelectorAll('.gbtn').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            const g = +btn.dataset.g;
            curGen = g;
            pool = g === 0 ? [...PD] : PD.filter(p => p.g === g);
            if (taMode) { startTA(); return; }
            resetStats();
            nextPoke();
        });

        function resetStats() {
            correct = 0; total = 0; streak = 0;
            $('sc').textContent = 0;
            $('st').textContent = 0;
            $('ss').textContent = 0;
        }

        // 이미지 로드
        function loadImg(filepath) {
            ldEl.style.display = 'block';
            pimgEl.style.display = 'none';
            pimgEl.className = 'pimg sil';
            ierrEl.style.display = 'none';
            pimgEl.src = 'images/' + filepath;
        }
        pimgEl.onload = function () {
            ldEl.style.display = 'none';
            ierrEl.style.display = 'none';
            pimgEl.style.display = 'block';
        };
        pimgEl.onerror = function () {
            ldEl.style.display = 'none';
            ierrEl.style.display = 'flex';
        };

        // 4지선다 보기 생성 (오답은 같은 세대에서 우선 선택)
        function makeChoices(correctName, gen) {
            const cName = displayName(correctName);
            const genNames = namesByGen[gen] || [];
            const source = genNames.length >= 4 ? genNames : uniqueNames;
            const wrongs = [];
            const used = new Set([cName]);
            while (wrongs.length < 3) {
                const pick = source[Math.floor(Math.random() * source.length)];
                if (!used.has(pick)) {
                    used.add(pick);
                    wrongs.push(pick);
                }
            }
            const options = [cName, ...wrongs];
            // 셔플
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return options;
        }

        // 보기 클릭
        function onChoice(idx) {
            if (ans) return;
            ans = true;
            total++;
            $('st').textContent = total;

            const picked = cbtns[idx];
            const correctName = displayName(cur.n);
            const isCorrect = picked.textContent === correctName;

            // 모든 버튼 비활성화 + 정답 표시
            cbtns.forEach(btn => {
                btn.classList.add('picked');
                if (btn.textContent === correctName) {
                    btn.classList.add('correct');
                } else if (btn === picked && !isCorrect) {
                    btn.classList.add('wrong');
                } else {
                    btn.classList.add('dim');
                }
            });

            let msg;
            if (isCorrect) {
                correct++; streak++;
                $('sc').textContent = correct;
                $('ss').textContent = streak;
                if (streak > bestStreak) {
                    bestStreak = streak;
                    lsSet('pkmq_best_streak', bestStreak);
                    if (!taMode) $('s4').textContent = bestStreak;
                }
                reveal();
                msg = streak >= 3 ? `🎉 정답! ${streak}연속 완벽해요! 🔥` : '🎉 정답! 맞췄어요!';
                pimgEl.classList.add('pop');
                setTimeout(() => pimgEl.classList.remove('pop'), 450);
                comboFx();
                sfxCorrect();
            } else {
                streak = 0;
                $('ss').textContent = 0;
                reveal();
                msg = `❌ 아쉬워요! 정답은 "${correctName}"`;
                picked.classList.add('shake');
                setTimeout(() => picked.classList.remove('shake'), 350);
                sfxWrong();
            }

            if (taMode) {
                // 타임어택: 인라인 피드백 + 자동으로 다음 문제 진행
                fbEl.textContent = msg;
                fbEl.className = isCorrect ? 'fb ok fadeup' : 'fb no fadeup';
                if (!taOver) taAdvance = setTimeout(() => {
                    if (taMode && !taOver) nextPoke();
                }, isCorrect ? 900 : 1500);
            } else {
                // 연습 모드: 화면 하단 고정 팝업
                $('fbMsg').textContent = msg;
                const pop = $('fbPop');
                pop.className = 'fb-pop ' + (isCorrect ? 'ok' : 'no');
                pop.style.display = 'block';
            }
        }

        function reveal() {
            pimgEl.className = 'pimg show fadeup';
            pnum.textContent = `No.${String(cur.id).padStart(3, '0')}`;
            pnameEl.textContent = displayName(cur.n);
            pnameEl.className = 'pname ans fadeup';
        }

        function nextPoke() {
            if (taOver) return;
            ans = false;
            // 직전 문제와 같은 포켓몬 연속 출제 방지
            let pick;
            do {
                pick = pool[Math.floor(Math.random() * pool.length)];
            } while (pool.length > 1 && cur && pick.id === cur.id && pick.n === cur.n);
            cur = pick;
            pnum.textContent = 'No.???';
            pnameEl.textContent = '？ ？ ？ ？';
            pnameEl.className = 'pname';
            fbEl.textContent = ''; fbEl.className = 'fb';
            nxtEl.style.display = 'none';
            $('fbPop').style.display = 'none';

            // 보기 세팅
            const options = makeChoices(cur.n, cur.g);
            cbtns.forEach((btn, i) => {
                btn.textContent = options[i];
                btn.className = 'cbtn';
                btn.onclick = () => { sfxClick(); onChoice(i); };
            });

            // 힌트 세팅
            const hints = typeof HINTS !== 'undefined' ? HINTS[cur.id] : null;
            if (hints && hints.length > 0) {
                hintText.textContent = hints[Math.floor(Math.random() * hints.length)];
            } else {
                hintText.textContent = '도감 설명이 없습니다.';
            }

            loadImg(cur.f);
        }

        function confetti(count = 45, golden = false) {
            const cls = golden
                ? ['#FFD700', '#FFC300', '#FFE066', '#FF6B35', '#FFF8DC']
                : ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFC0CB', '#DDA0DD'];
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'cf';
                const sz = 6 + Math.random() * 6;
                el.style.cssText = `left:${Math.random() * 100}vw;top:-12px;width:${sz}px;height:${sz}px;
      background:${cls[Math.floor(Math.random() * cls.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation:cfall ${0.9 + Math.random() * 1.4}s ease ${Math.random() * 0.5}s forwards`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2800);
            }
        }

        // ===== 콤보 연출 =====
        const cardEl = document.querySelector('.card'), flashEl = $('flash');

        function comboFx() {
            confetti(45 + Math.min(streak, 15) * 8, streak >= 5);
            if (streak >= 3) {
                const c = document.createElement('div');
                c.className = 'combo-float' + (streak >= 10 ? ' mega' : '');
                c.textContent = streak >= 10 ? `⚡ ${streak} COMBO!! ⚡` : `🔥 ${streak} COMBO!`;
                cardEl.appendChild(c);
                setTimeout(() => c.remove(), 1200);
            }
            if (streak >= 5 && streak % 5 === 0) { screenFlash(); sfxCombo(); }
        }

        function screenFlash() {
            flashEl.classList.remove('go');
            void flashEl.offsetWidth;
            flashEl.classList.add('go');
        }

        function sfxCombo() {
            [523, 659, 784, 1047, 1319].forEach((f, i) =>
                setTimeout(() => playTone(f, 0.09, 'square', 0.1), i * 55));
        }

        // ===== 타임어택 =====
        let cdTimer = null;

        function cancelTATimers() {
            clearInterval(taTimer); clearTimeout(taAdvance); clearTimeout(cdTimer);
            $('cdown').style.display = 'none';
        }

        function startTA() {
            cancelTATimers();
            taMode = true; taOver = false;
            ans = true; // 카운트다운 중 입력 차단
            $('mTa').classList.add('on'); $('mNormal').classList.remove('on');
            $('taEnd').style.display = 'none';
            $('board').style.display = 'none';
            choicesEl.style.display = 'grid';
            $('hint').style.display = 'block';
            resetStats();
            $('s4l').textContent = '⏱️ 남은시간';
            const s4 = $('s4');
            s4.textContent = TA_SECONDS;
            s4.classList.remove('low');
            // 3-2-1 카운트다운
            const cd = $('cdown'), num = $('cdNum');
            cd.style.display = 'flex';
            let n = 3;
            const tick = () => {
                if (n > 0) {
                    num.textContent = n;
                    num.className = 'cd-num';
                    void num.offsetWidth;
                    num.className = 'cd-num pop2';
                    playTone(660, 0.12, 'square', 0.12);
                    n--;
                    cdTimer = setTimeout(tick, 800);
                } else {
                    num.textContent = 'GO!';
                    num.className = 'cd-num';
                    void num.offsetWidth;
                    num.className = 'cd-num pop2';
                    playTone(1047, 0.3, 'square', 0.14);
                    cdTimer = setTimeout(() => {
                        cd.style.display = 'none';
                        beginTA();
                    }, 550);
                }
            };
            tick();
        }

        function beginTA() {
            taTime = TA_SECONDS;
            const s4 = $('s4');
            s4.textContent = taTime;
            taTimer = setInterval(() => {
                taTime--;
                s4.textContent = Math.max(taTime, 0);
                if (taTime <= 10) s4.classList.add('low');
                if (taTime <= 0) endTA();
            }, 1000);
            nextPoke();
        }

        function endTA() {
            clearInterval(taTimer); clearTimeout(taAdvance);
            taOver = true; ans = true;
            reveal();
            choicesEl.style.display = 'none';
            $('hint').style.display = 'none';
            fbEl.textContent = ''; fbEl.className = 'fb';
            nxtEl.style.display = 'none';
            $('taScore').textContent = `${correct}마리 맞췄어요!`;
            const board = loadBoard();
            const qualifies = correct > 0 && (board.length < 10 || correct > board[board.length - 1].s);
            $('nameRow').style.display = qualifies ? 'flex' : 'none';
            $('taTitle').textContent = qualifies ? '🎉 TOP 10 진입!' : '⏱️ 타임어택 종료!';
            if (qualifies) $('nameInput').value = lsGet('pkmq_name', '');
            $('taEnd').style.display = 'block';
            renderBoard();
            $('board').style.display = 'block';
            sfxNext();
        }

        // ===== 리더보드 =====
        function esc(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function renderBoard() {
            const board = loadBoard();
            if (!board.length) {
                $('boardList').innerHTML = '<div class="board-empty">아직 기록이 없어요. 타임어택에 도전해보세요!</div>';
                return;
            }
            const medals = ['🥇', '🥈', '🥉'];
            $('boardList').innerHTML = board.map((r, i) =>
                `<div class="brd-row${i < 3 ? ' top' : ''}">
                    <span class="brd-rank">${medals[i] || (i + 1)}</span>
                    <span class="brd-name">${esc(r.n)}</span>
                    <span class="brd-gen">${r.g == null ? '' : (r.g === 0 ? '전체' : r.g + '세대')}</span>
                    <span class="brd-score">${r.s}마리</span>
                    <span class="brd-date">${r.d}</span>
                </div>`).join('');
        }

        $('saveBtn').addEventListener('click', () => {
            const name = $('nameInput').value.trim() || '트레이너';
            lsSet('pkmq_name', name);
            const board = loadBoard();
            board.push({ n: name, s: correct, g: curGen, d: new Date().toISOString().slice(0, 10) });
            board.sort((a, b) => b.s - a.s);
            lsSet('pkmq_board', JSON.stringify(board.slice(0, 10)));
            $('nameRow').style.display = 'none';
            $('taTitle').textContent = '✅ 기록 저장 완료!';
            renderBoard();
            sfxCorrect();
            confetti(70, true);
        });

        $('retryBtn').addEventListener('click', () => { sfxNext(); startTA(); });

        // ===== 모드 전환 =====
        $('mNormal').addEventListener('click', () => {
            if (!taMode) return;
            cancelTATimers();
            taMode = false; taOver = false;
            $('mNormal').classList.add('on'); $('mTa').classList.remove('on');
            $('taEnd').style.display = 'none';
            $('board').style.display = 'none';
            choicesEl.style.display = 'grid';
            $('hint').style.display = 'block';
            $('s4l').textContent = '🏆 최고연속';
            const s4 = $('s4');
            s4.textContent = bestStreak;
            s4.classList.remove('low');
            resetStats();
            nextPoke();
        });

        $('mTa').addEventListener('click', () => { sfxNext(); startTA(); });

        $('mBoard').addEventListener('click', () => {
            const b = $('board');
            if (b.style.display === 'block') { b.style.display = 'none'; return; }
            renderBoard();
            b.style.display = 'block';
        });

        // 키보드 단축키 (1~4로 선택, Enter/Space로 다음)
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (!ans && e.key >= '1' && e.key <= '4') {
                sfxClick();
                onChoice(+e.key - 1);
            } else if (ans && !taMode && (e.key === 'Enter' || e.key === ' ')) {
                e.preventDefault();
                sfxNext();
                nextPoke();
            }
        });

        $('nxt').addEventListener('click', () => { sfxNext(); nextPoke(); });
        $('nxt2').addEventListener('click', () => { sfxNext(); nextPoke(); });

        // 시작
        $('s4').textContent = bestStreak;
        nextPoke();
    </script>
</body>

</html>
